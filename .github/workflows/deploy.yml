# Deploys to ICDSoft bare repo; post-receive checks out into
# /home/chuckneedham/www/www (https://chuckneedham.com document root).
# Requires server one-time setup in DEPLOY-ICDSOFT.txt first.
name: Deploy to ICDSoft

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        env:
          ICDSOFT_SSH_KEY: ${{ secrets.ICDSOFT_SSH_KEY }}
          ICDSOFT_HOST: ${{ secrets.ICDSOFT_HOST }}
          ICDSOFT_USER: ${{ secrets.ICDSOFT_USER }}
        run: |
          if [ -z "$ICDSOFT_SSH_KEY" ] || [ -z "$ICDSOFT_HOST" ] || [ -z "$ICDSOFT_USER" ]; then
            echo "Missing ICDSOFT_SSH_KEY, ICDSOFT_HOST, or ICDSOFT_USER secrets. Skipping live deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$ICDSOFT_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$ICDSOFT_HOST" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host icdsoft
            HostName $ICDSOFT_HOST
            User $ICDSOFT_USER
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking yes
          EOF

      - name: Push to ICDSoft bare repo
        env:
          ICDSOFT_SSH_KEY: ${{ secrets.ICDSOFT_SSH_KEY }}
        run: |
          if [ -z "$ICDSOFT_SSH_KEY" ]; then
            echo "No deploy key - GitHub copy only."
            exit 0
          fi
          # Bare repo post-receive -> GIT_WORK_TREE=/home/chuckneedham/www/www
          git remote add icdsoft icdsoft:/home/chuckneedham/private/chuckneeedham-deploy.git
          git push icdsoft HEAD:main --force
